
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YiYi的小仓库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        h1, h2 {
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }
        /* 登录框样式 */
        #loginSection {
            text-align: center;
            padding: 20px;
        }
        input[type="password"], input[type="file"] {
            padding: 10px;
            border-radius: 5px;
            border: none;
            margin: 10px 0;
            width: 250px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        .btn-primary { background-color: #00d2ff; color: #333; }
        .btn-danger { background-color: #ff4b5c; color: white; }
        .btn-success { background-color: #1dd1a1; color: white; }
        .btn-warning { background-color: #feca57; color: #333; }
        .btn-small { padding: 5px 10px; font-size: 0.8em; }

        /* 文件列表样式 */
        #mainSection { display: none; }
        .file-list {
            list-style: none;
            margin-top: 20px;
        }
        .file-item {
            background: rgba(255,255,255,0.05);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .file-info { flex: 1; margin-right: 15px; word-break: break-all;}
        .file-actions { display: flex; gap: 10px; }

        /* 进度条样式 */
        .progress-container {
            width: 100%;
            background-color: rgba(255,255,255,0.2);
            border-radius: 4px;
            margin-top: 10px;
            height: 20px;
            overflow: hidden;
            display: none;
        }
        .progress-bar {
            height: 100%;
            background-color: #00d2ff;
            width: 0%;
            text-align: center;
            line-height: 20px;
            color: #333;
            font-size: 12px;
            font-weight: bold;
            transition: width 0.2s;
        }
        /* 上传区域 */
        .upload-area {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        /* 顶部工具栏 */
        .header-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .logout-btn {
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 5px 15px;
            font-size: 0.9em;
        }
        /* 底部状态栏 */
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0,0,0,0.5);
            padding: 10px 0;
            text-align: center;
            font-size: 0.9em;
            color: #aaa;
            backdrop-filter: blur(5px);
        }
        /* 复选框样式优化 */
        .checkbox-container {
            display: flex;
            align-items: center;
            margin-right: 10px;
        }
        .checkbox-container input {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登录区域 -->
        <div id="loginSection">
            <h1>YiYi的小仓库</h1>
            <div style="margin-bottom: 15px; color: #ffcccc;">默认密码是 123456，登录后可以修改</div>
            <input type="password" id="loginPass" placeholder="请输入密码">
            <button class="btn-primary" onclick="login()">登录</button>
            <p id="loginMsg" style="color: #ff4b5c; margin-top: 10px;"></p>
        </div>

        <!-- 主界面 -->
        <div id="mainSection">
            <div class="header-tools">
                <h2>文件列表</h2>
                <div>
                    <!-- 新增：批量删除按钮 -->
                    <button class="btn-danger btn-small" onclick="batchDelete()">批量删除</button>
                    <button class="btn-warning btn-small" onclick="showChangePass()">修改密码</button>
                    <button class="logout-btn btn-small" onclick="logout()">退出</button>
                </div>
            </div>

            <!-- 上传区域 -->
            <div class="upload-area">
                <input type="file" id="fileInput" onchange="handleFileSelect(event)">
                <button class="btn-success" onclick="uploadFile()">上传文件</button>
                <!-- 上传进度条 -->
                <div id="uploadProgressContainer" class="progress-container">
                    <div id="uploadProgressBar" class="progress-bar">0%</div>
                </div>
                <div id="uploadStatus" style="margin-top:10px; font-size: 0.9em;"></div>
            </div>

            <ul id="fileList" class="file-list">
                <!-- 文件列表将通过JS插入 -->
            </ul>
        </div>
    </div>

    <!-- 新增：底部状态栏 -->
    <div class="status-bar" id="statusBar">
        <!-- 当前时间与地点将显示在这里 -->
    </div>

    <script>
        // ==========================================
        // 配置区域 (已填入你的 Token)
        // ==========================================
        const GITHUB_CONFIG = {
            owner: 'xull-hub', // 请确认这是你的 GitHub 用户名
            repo: 'WareHouseOfYiyi', // 请确认这是你的仓库名
            token: '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' // 已填入你提供的 Token
        };
        
        // 存储密码的 Key
        const PASSWORD_KEY = 'YiYi_Warehouse_Password';

        // ==========================================
        // 核心逻辑
        // ==========================================
        // 页面加载时检查登录状态
        window.onload = function() {
            // 初始化：设置默认密码 (仅首次运行时生效)
            if (!localStorage.getItem(PASSWORD_KEY)) {
                localStorage.setItem(PASSWORD_KEY, '123456');
            }
            // 检查是否已登录
            if (localStorage.getItem('isLoggedIn') === 'true') {
                showMain();
                listFiles(); // 自动加载文件
            } else {
                showLogin();
            }
            // 初始化状态栏
            updateStatusBar();
            // 每秒更新一次时间
            setInterval(updateStatusBar, 1000);
        };

        // 1. 登录功能
        function login() {
            const inputPass = document.getElementById('loginPass').value;
            const storedPass = localStorage.getItem(PASSWORD_KEY);
            if (inputPass === storedPass) {
                localStorage.setItem('isLoggedIn', 'true');
                showMain();
                listFiles(); // 登录成功后加载文件
            } else {
                document.getElementById('loginMsg').textContent = '密码错误！';
            }
        }

        // 2. 修改密码功能
        function showChangePass() {
            const oldPass = prompt('请输入旧密码：');
            const storedPass = localStorage.getItem(PASSWORD_KEY);
            if (oldPass === storedPass) {
                const newPass = prompt('请输入新密码：');
                if (newPass && newPass.length > 0) {
                    localStorage.setItem(PASSWORD_KEY, newPass);
                    alert('密码修改成功！');
                }
            } else {
                alert('旧密码错误！');
            }
        }

        // 3. 文件列表 (自动刷新)
        async function listFiles() {
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '<li style="padding: 10px; color: #aaa;">加载中...</li>';
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/`, {
                    headers: {
                        'Authorization': `token ${GITHUB_CONFIG.token}`
                    }
                });
                const data = await response.json();
                fileList.innerHTML = '';
                if (data.message) {
                    fileList.innerHTML = `<li style="padding: 10px; color: red;">Error: ${data.message}</li>`;
                    return;
                }
                if (data.length === 0) {
                    fileList.innerHTML = '<li style="padding: 10px; color: #aaa;">仓库为空</li>';
                    return;
                }
                // 修改：生成带复选框的列表项
                data.forEach(file => {
                    const li = document.createElement('li');
                    li.className = 'file-item';
                    li.innerHTML = `
                        <div class="checkbox-container">
                            <input type="checkbox" id="cb_${file.sha}" data-sha="${file.sha}" data-path="${file.path}">
                        </div>
                        <div class="file-info">
                            <label for="cb_${file.sha}" style="cursor: pointer;">
                                <strong>${file.name}</strong>
                                <span style="opacity: 0.7;">(${(file.size / 1024).toFixed(2)} KB)</span>
                            </label>
                        </div>
                        <div class="file-actions">
                            <button class="btn-success btn-small" onclick="downloadFile('${file.download_url}', '${file.name}')">下载</button>
                            <button class="btn-danger btn-small" onclick="deleteFile('${file.path}', '${file.sha}')">删除</button>
                        </div>
                    `;
                    fileList.appendChild(li);
                });
            } catch (err) {
                fileList.innerHTML = `<li style="padding: 10px; color: red;">加载失败: ${err.message}</li>`;
            }
        }

        // 4. 上传文件 (带进度条)
        let currentFile = null;
        function handleFileSelect(event) {
            currentFile = event.target.files[0];
            if (currentFile) {
                document.getElementById('uploadStatus').textContent = `已选择: ${currentFile.name} (${(currentFile.size / 1024).toFixed(2)} KB)`;
                // 重置进度条
                document.getElementById('uploadProgressContainer').style.display = 'none';
                document.getElementById('uploadProgressBar').style.width = '0%';
                document.getElementById('uploadProgressBar').textContent = '0%';
            }
        }

        async function uploadFile() {
            if (!currentFile) {
                alert('请先选择一个文件！');
                return;
            }
            const file = currentFile;
            const content = await readFileAsBase64(file);
            
            // 显示进度条容器
            const progressContainer = document.getElementById('uploadProgressContainer');
            const progressBar = document.getElementById('uploadProgressBar');
            progressContainer.style.display = 'block';

            try {
                // 模拟上传进度
                let progress = 0;
                const interval = setInterval(() => {
                    progress += 10;
                    if (progress >= 100) {
                        progress = 100;
                        clearInterval(interval);
                    }
                    progressBar.style.width = progress + '%';
                    progressBar.textContent = progress + '%';
                }, 200);

                const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${encodeURIComponent(file.name)}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `token ${GITHUB_CONFIG.token}`
                    },
                    body: JSON.stringify({
                        message: `Upload ${file.name}`,
                        content: content
                    })
                });

                clearInterval(interval);
                const result = await response.json();
                if (response.ok) {
                    progressBar.style.width = '100%';
                    progressBar.textContent = '100%';
                    document.getElementById('uploadStatus').textContent = '上传成功！';
                    currentFile = null;
                    document.getElementById('fileInput').value = ''; // 清空选择
                    listFiles(); // 自动刷新列表
                } else {
                    throw new Error(result.message || 'Upload failed');
                }
            } catch (err) {
                progressBar.style.backgroundColor = '#ff4b5c';
                progressBar.textContent = '错误';
                document.getElementById('uploadStatus').textContent = `上传失败: ${err.message}`;
            }
        }

        // 辅助函数：读取文件为 Base64
        function readFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const base64 = reader.result.split(',')[1]; // 移除 data:image/type;base64, 前缀
                    resolve(base64);
                };
                reader.onerror = error => reject(error);
                reader.readAsDataURL(file);
            });
        }

        // 5. 下载文件 (带进度条)
        async function downloadFile(url, filename) {
            const button = event.target;
            const originalText = button.innerHTML;
            // 修改按钮样式为进度条
            button.innerHTML = '<span>下载中... 0%</span>';
            button.style.position = 'relative';
            button.style.overflow = 'hidden';
            const progressSpan = button.querySelector('span');
            let progress = 0;
            try {
                // 模拟下载进度
                const interval = setInterval(() => {
                    progress += 10;
                    if (progress >= 100) {
                        clearInterval(interval);
                        // 模拟结束后触发真实下载
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = filename;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        // 恢复按钮
                        setTimeout(() => {
                            button.innerHTML = originalText;
                            button.style.position = '';
                            button.style.overflow = '';
                        }, 500);
                    }
                    progressSpan.textContent = `下载中... ${progress}%`;
                }, 100);
            } catch (err) {
                button.innerHTML = '失败';
                setTimeout(() => {
                    button.innerHTML = originalText;
                }, 1000);
            }
        }

        // 6. 删除文件
        async function deleteFile(path, sha) {
            if (!confirm(`确定要删除 ${path} 吗？`)) return;
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${path}`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `token ${GITHUB_CONFIG.token}`
                    },
                    body: JSON.stringify({
                        message: `Delete ${path}`,
                        sha: sha
                    })
                });
                if (response.ok) {
                    alert('删除成功！');
                    listFiles(); // 自动刷新
                } else {
                    const data = await response.json();
                    throw new Error(data.message);
                }
            } catch (err) {
                alert('删除失败: ' + err.message);
            }
        }

        // 7. 退出登录
        function logout() {
            localStorage.setItem('isLoggedIn', 'false');
            showLogin();
        }

        // UI 切换
        function showLogin() {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('mainSection').style.display = 'none';
        }
        function showMain() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('mainSection').style.display = 'block';
        }

        // ==========================================
        // 新增功能：批量删除
        // ==========================================
        async function batchDelete() {
            // 获取所有被选中的复选框
            const checkboxes = document.querySelectorAll('#fileList input[type="checkbox"]:checked');
            if (checkboxes.length === 0) {
                alert('请先勾选要删除的文件！');
                return;
            }

            if (!confirm(`确定要删除选中的 ${checkboxes.length} 个文件吗？`)) return;

            // 遍历选中的文件并删除
            for (const checkbox of checkboxes) {
                const path = checkbox.dataset.path;
                const sha = checkbox.dataset.sha;
                try {
                    await deleteFileDirect(path, sha); // 使用直接删除函数
                } catch (err) {
                    console.error(`删除 ${path} 失败:`, err);
                }
            }

            // 刷新列表
            listFiles();
        }

        // 辅助函数：直接删除（不弹窗确认，供批量调用）
        async function deleteFileDirect(path, sha) {
            const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${path}`, {
                method: 'DELETE',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `token ${GITHUB_CONFIG.token}`
                },
                body: JSON.stringify({
                    message: `Delete ${path}`,
                    sha: sha
                })
            });
            if (!response.ok) {
                const data = await response.json();
                throw new Error(data.message);
            }
        }

        // ==========================================
        // 新增功能：底部状态栏
        // ==========================================
        function updateStatusBar() {
            const now = new Date();
            // 格式化时间显示
            const timeStr = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
            // 固定地点
            const location = '陕西省 西安市';
            document.getElementById('statusBar').textContent = `当前时间：${timeStr} | 当前地点：${location}`;
        }
    </script>
</body>
</html>
