<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 文件管理器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-section {
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.9);
            color: #333;
        }
        
        button {
            background: #4CAF50;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            margin: 5px;
        }
        
        button:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        
        .upload-section {
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        
        .file-input {
            display: none;
        }
        
        .upload-btn {
            background: #2196F3;
        }
        
        .list-section {
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 10px;
        }
        
        .file-list {
            display: grid;
            gap: 10px;
            margin-top: 20px;
        }
        
        .file-item {
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .file-info {
            flex: 1;
        }
        
        .file-actions {
            display: flex;
            gap: 10px;
        }
        
        .download-btn {
            background: #FF9800;
        }
        
        .delete-btn {
            background: #f44336;
        }
        
        .status {
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            text-align: center;
        }
        
        .success {
            background: rgba(76, 175, 80, 0.3);
            color: #4CAF50;
        }
        
        .error {
            background: rgba(244, 67, 54, 0.3);
            color: #f44336;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📁 GitHub 文件管理器</h1>
            <p>上传和下载 GitHub 仓库文件</p>
        </div>
        
        <div class="auth-section">
            <h3>🔐 认证设置</h3>
            <div class="form-group">
                <label for="repoOwner">仓库拥有者:</label>
                <input type="text" id="repoOwner" placeholder="输入 GitHub 用户名" value="xull-hub">
            </div>
            <div class="form-group">
                <label for="repoName">仓库名称:</label>
                <input type="text" id="repoName" placeholder="输入仓库名称" value="HappyBirthdayToYiyi">
            </div>
            <div class="form-group">
                <label for="githubToken">GitHub Token:</label>
                <input type="password" id="githubToken" placeholder="输入 GitHub Personal Access Token">
                <small>提示: 需要创建具有 repo 权限的 Personal Access Token</small>
            </div>
            <button onclick="saveAuth()">保存认证信息</button>
        </div>
        
        <div class="upload-section">
            <h3>📤 文件上传</h3>
            <input type="file" id="fileInput" class="file-input" multiple>
            <button class="upload-btn" onclick="document.getElementById('fileInput').click()">选择文件</button>
            <span id="selectedFiles"></span>
            <br><br>
            <button onclick="uploadFiles()">上传到 GitHub</button>
            <div id="uploadStatus"></div>
        </div>
        
        <div class="list-section">
            <h3>📥 文件列表</h3>
            <button onclick="loadFiles()">刷新文件列表</button>
            <div id="fileList" class="file-list">
                <div class="empty-state">点击"刷新文件列表"加载文件</div>
            </div>
        </div>
    </div>

    <script>
        let authData = {
            token: '',
            owner: 'xull-hub',
            repo: 'HappyBirthdayToYiyi'
        };

        // 保存认证信息
        function saveAuth() {
            authData.owner = document.getElementById('repoOwner').value;
            authData.repo = document.getElementById('repoName').value;
            authData.token = document.getElementById('githubToken').value;
            
            if (!authData.token) {
                showStatus('请输入 GitHub Token', 'error');
                return;
            }
            
            localStorage.setItem('githubAuth', JSON.stringify(authData));
            showStatus('认证信息已保存', 'success');
        }

        // 加载认证信息
        function loadAuth() {
            const saved = localStorage.getItem('githubAuth');
            if (saved) {
                authData = JSON.parse(saved);
                document.getElementById('repoOwner').value = authData.owner;
                document.getElementById('repoName').value = authData.repo;
                document.getElementById('githubToken').value = authData.token;
            }
        }

        // 选择文件
        function handleFileSelect(event) {
            const files = event.target.files;
            let fileNames = [];
            for (let file of files) {
                fileNames.push(file.name);
            }
            document.getElementById('selectedFiles').textContent = 
                fileNames.length > 0 ? `已选择: ${fileNames.join(', ')}` : '';
        }

        // 上传文件
        async function uploadFiles() {
            const fileInput = document.getElementById('fileInput');
            const files = fileInput.files;
            
            if (files.length === 0) {
                showStatus('请选择要上传的文件', 'error');
                return;
            }

            if (!authData.token) {
                showStatus('请先保存认证信息', 'error');
                return;
            }

            for (let file of files) {
                try {
                    showStatus(`正在上传 ${file.name}...`, 'success');
                    
                    // 读取文件内容
                    const content = await readFileAsBase64(file);
                    
                    // 准备 API 请求数据
                    const apiUrl = `https://api.github.com/repos/${authData.owner}/${authData.repo}/contents/files/${file.name}`;
                    const data = {
                        message: `Upload ${file.name}`,
                        content: content,
                        branch: "main"
                    };

                    // 发送请求
                    const response = await fetch(apiUrl, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${authData.token}`,
                            'Accept': 'application/vnd.github.v3+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(data)
                    });

                    if (response.ok) {
                        showStatus(`${file.name} 上传成功!`, 'success');
                    } else {
                        const error = await response.json();
                        showStatus(`上传失败: ${error.message}`, 'error');
                    }
                } catch (error) {
                    showStatus(`上传错误: ${error.message}`, 'error');
                }
            }
            
            // 清空文件选择
            fileInput.value = '';
            document.getElementById('selectedFiles').textContent = '';
        }

        // 读取文件为 base64
        function readFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    // 移除 data URL 前缀，只保留 base64 编码部分
                    const base64 = reader.result.split(',')[1];
                    resolve(base64);
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // 加载文件列表
        async function loadFiles() {
            if (!authData.token) {
                showStatus('请先保存认证信息', 'error');
                return;
            }

            try {
                const response = await fetch(
                    `https://api.github.com/repos/${authData.owner}/${authData.repo}/contents/files`,
                    {
                        headers: {
                            'Authorization': `token ${authData.token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    }
                );

                if (response.ok) {
                    const files = await response.json();
                    displayFiles(files);
                } else {
                    showStatus('加载文件列表失败', 'error');
                }
            } catch (error) {
                showStatus(`加载错误: ${error.message}`, 'error');
            }
        }

        // 显示文件列表
        function displayFiles(files) {
            const fileList = document.getElementById('fileList');
            
            if (files.length === 0) {
                fileList.innerHTML = '<div class="empty-state">暂无文件</div>';
                return;
            }

            fileList.innerHTML = files.map(file => `
                <div class="file-item">
                    <div class="file-info">
                        <strong>${file.name}</strong><br>
                        <small>大小: ${(file.size / 1024).toFixed(2)} KB</small>
                    </div>
                    <div class="file-actions">
                        <button class="download-btn" onclick="downloadFile('${file.download_url}', '${file.name}')">
                            下载
                        </button>
                        <button class="delete-btn" onclick="deleteFile('${file.path}', '${file.sha}')">
                            删除
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // 下载文件
        function downloadFile(downloadUrl, fileName) {
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // 删除文件
        async function deleteFile(filePath, sha) {
            if (!confirm('确定要删除这个文件吗？')) return;

            try {
                const response = await fetch(
                    `https://api.github.com/repos/${authData.owner}/${authData.repo}/contents/${filePath}`,
                    {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `token ${authData.token}`,
                            'Accept': 'application/vnd.github.v3+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Delete ${filePath.split('/').pop()}`,
                            sha: sha,
                            branch: "main"
                        })
                    }
                );

                if (response.ok) {
                    showStatus('文件删除成功!', 'success');
                    loadFiles(); // 刷新列表
                } else {
                    const error = await response.json();
                    showStatus(`删除失败: ${error.message}`, 'error');
                }
            } catch (error) {
                showStatus(`删除错误: ${error.message}`, 'error');
            }
        }

        // 显示状态消息
        function showStatus(message, type) {
            const statusDiv = document.createElement('div');
            statusDiv.className = `status ${type}`;
            statusDiv.textContent = message;
            document.getElementById('uploadStatus').appendChild(statusDiv);
            
            setTimeout(() => {
                statusDiv.remove();
            }, 3000);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadAuth();
            
            // 监听文件选择事件
            document.getElementById('fileInput').addEventListener('change', handleFileSelect);
        });
    </script>
</body>
</html>
